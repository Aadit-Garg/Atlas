site_name: Atlas Framework
site_description: A modular framework for building Personal Operating Systems.
repo_url: https://github.com/your-org/atlas

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture.md
    - Worker Lifecycle: architecture/worker-lifecycle.md
    - Model System: architecture/model-system.md
    - Resolution: architecture/resolution.md
  - Workers: workers.md
  - Models: models.md
  - Roles: roles.md
  - Communication: communication.md
  - Core: core.md
  - History:
    - Naming Evolution: history/naming.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
